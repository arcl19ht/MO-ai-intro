server: # 服务器元数据
  name: Z_MCPServer
  name_zh: Z MCP 服务器
  author: Z Project
  description: A trial in AI dev.
  description_zh: AI智能体开发的一次尝试。
  version: 0.1.1

transport: # 服务器启动方式配置
  type: "sse" # 可选值: stdio, sse
  host: "127.0.0.1" # 仅在 type 为 sse 时有效，表示监听地址，默认为 0.0.0.0
  port: 12345 # 仅在 type 为 sse 时有效，表示监听端口，默认为 12345

logging: # 日志配置
  console:
    enabled: true
    level: "DEBUG"
  file:
    enabled: true
    level: "DEBUG"
    path: "logs/%Y-%m-%d_%H-%M-%S.log"
    rotation: "10 MB"
    retention: "7 days"
    compression: "zip"

# DeepSeek API配置
deepseek:
  api_url: "https://api.deepseek.com/chat/completions"
  model: "deepseek-chat"
  temperature: 0.7
  timeout: 60

# 聚合数据相关配置
weather: # 天气API
  api_url: "http://apis.juhe.cn/simpleWeather/query"
  max_cities_comparison: 5
train: # 火车票API
  api_url: "https://apis.juhe.cn/fapigw/train/query"
  stations_file: "data/train_stations.json"  # 车站数据文件路径
  max_routes_comparison: 5

# 高德地图相关配置
amap: # 高德地图API URL
  api_url: "https://restapi.amap.com/v3/place/text"